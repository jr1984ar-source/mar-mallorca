<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mar Mallorca</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
}

#sky-canvas {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  pointer-events: none;
}

#sea-strip {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 35%;
  z-index: 1;
  pointer-events: none;
  transition: background 2s ease;
}

.app {
  position: relative;
  z-index: 10;
  max-width: 960px;
  margin: 0 auto;
  padding: 20px 16px 48px;
}

.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 22px;
  flex-wrap: wrap;
  gap: 10px;
}

.header-left h1 {
  font-size: 24px;
  font-weight: 700;
  color: #fff;
  text-shadow: 0 1px 8px rgba(0,0,0,0.6);
  display: flex;
  align-items: center;
  gap: 9px;
}
.header-left h1 i { font-size: 22px; }

.time-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(0,0,0,0.30);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 0.5px solid rgba(255,255,255,0.2);
  border-radius: 20px;
  padding: 4px 13px;
  font-size: 12px;
  color: rgba(255,255,255,0.88);
  margin-top: 7px;
}
.time-badge .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #4ade80;
  flex-shrink: 0;
}
.time-badge .dot.loading { background: #fbbf24; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

.refresh-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  padding: 9px 16px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 0.5px solid rgba(255,255,255,0.3);
  border-radius: 10px;
  cursor: pointer;
  color: #fff;
  font-family: inherit;
  transition: background 0.15s;
}
.refresh-btn:hover { background: rgba(255,255,255,0.25); }
.refresh-btn i { font-size: 15px; }

.zone-tabs {
  display: flex;
  margin-bottom: 20px;
  background: rgba(0,0,0,0.28);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 0.5px solid rgba(255,255,255,0.15);
  border-radius: 12px;
  overflow: hidden;
}
.tab-btn {
  flex: 1;
  padding: 11px 8px;
  font-size: 13px;
  font-weight: 500;
  background: transparent;
  border: none;
  border-right: 0.5px solid rgba(255,255,255,0.12);
  color: rgba(255,255,255,0.6);
  cursor: pointer;
  font-family: inherit;
  transition: background 0.15s, color 0.15s;
}
.tab-btn:last-child { border-right: none; }
.tab-btn.active { background: rgba(255,255,255,0.18); color: #fff; }
.tab-btn:hover:not(.active) { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.85); }

.beach-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
  gap: 16px;
}

.beach-card {
  border-radius: 16px;
  border: 0.5px solid rgba(255,255,255,0.22);
  overflow: hidden;
  position: relative;
  min-height: 220px;
}

.card-sat-bg {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  background-color: #0d1e2e;
  z-index: 0;
}

.card-overlay {
  position: absolute;
  inset: 0;
  background: rgba(4, 16, 32, 0.60);
  z-index: 1;
}

.card-content {
  position: relative;
  z-index: 2;
  padding: 15px;
  color: #fff;
}

.beach-name {
  font-size: 14px;
  font-weight: 700;
  color: #fff;
  margin-bottom: 13px;
  padding-right: 72px;
  text-shadow: 0 1px 4px rgba(0,0,0,0.7);
  letter-spacing: 0.01em;
}

.sea-state-badge {
  position: absolute;
  top: 13px;
  right: 13px;
  font-size: 10px;
  padding: 3px 9px;
  border-radius: 20px;
  font-weight: 700;
  letter-spacing: 0.04em;
  z-index: 3;
}
.state-calm     { background: rgba(74,222,128,0.22); color: #86efac; border: 0.5px solid rgba(74,222,128,0.4); }
.state-moderate { background: rgba(251,191,36,0.22); color: #fde68a; border: 0.5px solid rgba(251,191,36,0.4); }
.state-rough    { background: rgba(248,113,113,0.22); color: #fca5a5; border: 0.5px solid rgba(248,113,113,0.4); }

.metric-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 10px;
}
.metric-icon {
  width: 32px; height: 32px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 15px;
}
.metric-icon.wave { background: rgba(56,130,221,0.28); color: #93c5fd; border: 0.5px solid rgba(147,197,253,0.3); }
.metric-icon.wind { background: rgba(52,211,153,0.22); color: #6ee7b7; border: 0.5px solid rgba(110,231,183,0.3); }

.metric-label { font-size: 10px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 2px; }
.metric-value {
  font-size: 18px; font-weight: 700; color: #fff;
  line-height: 1.15; display: flex; align-items: center; gap: 5px;
  text-shadow: 0 1px 3px rgba(0,0,0,0.6);
}
.metric-unit { font-size: 12px; font-weight: 400; color: rgba(255,255,255,0.55); }
.metric-sub  { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 2px; }

.wave-bar-wrap { margin-top: 5px; height: 3px; background: rgba(255,255,255,0.12); border-radius: 2px; overflow: hidden; }
.wave-bar { height: 100%; border-radius: 2px; transition: width 0.6s ease; }

.sky-row {
  display: flex;
  margin-top: 12px;
  padding-top: 11px;
  border-top: 0.5px solid rgba(255,255,255,0.14);
}
.sky-block { flex: 1; text-align: center; padding: 3px 0; }
.sky-block + .sky-block { border-left: 0.5px solid rgba(255,255,255,0.12); }
.sky-icon { font-size: 19px; margin-bottom: 3px; }
.sky-val  { font-size: 15px; font-weight: 700; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.5); }
.sky-lbl  { font-size: 10px; color: rgba(255,255,255,0.45); margin-top: 1px; }

.loading-card {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 160px; gap: 10px;
  color: rgba(255,255,255,0.55); font-size: 13px;
}
.spinner {
  width: 22px; height: 22px;
  border: 2px solid rgba(255,255,255,0.18);
  border-top-color: #93c5fd;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.error-msg {
  display: flex; align-items: center; justify-content: center;
  min-height: 80px; gap: 6px; font-size: 13px; color: #fca5a5;
}

.next-update {
  font-size: 12px;
  color: rgba(255,255,255,0.4);
  text-align: center;
  margin-top: 28px;
  text-shadow: 0 1px 3px rgba(0,0,0,0.5);
}
.tile-credit {
  font-size: 10px;
  color: rgba(255,255,255,0.25);
  text-align: right;
  margin-top: 8px;
}

@media (max-width: 520px) {
  .tab-btn { font-size: 11px; padding: 9px 4px; }
  .beach-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<canvas id="sky-canvas"></canvas>
<div id="sea-strip"></div>

<div class="app">
  <div class="header">
    <div class="header-left">
      <h1><i class="ti ti-wave-sine"></i>Mar Mallorca</h1>
      <div class="time-badge">
        <span class="dot loading" id="dot"></span>
        <span id="update-time">Cargando datos...</span>
      </div>
    </div>
    <button class="refresh-btn" onclick="loadAll()">
      <i class="ti ti-refresh"></i>Actualizar
    </button>
  </div>

  <div class="zone-tabs">
    <button class="tab-btn active" onclick="showZone(0,this)">Palmanova</button>
    <button class="tab-btn" onclick="showZone(1,this)">Port de Andratx</button>
    <button class="tab-btn" onclick="showZone(2,this)">Colonia Sant Jordi</button>
    <button class="tab-btn" onclick="showZone(3,this)">Alcúdia</button>
  </div>

  <div id="zone-0" class="beach-grid"></div>
  <div id="zone-1" class="beach-grid" style="display:none"></div>
  <div id="zone-2" class="beach-grid" style="display:none"></div>
  <div id="zone-3" class="beach-grid" style="display:none"></div>

  <p class="next-update" id="next-update"></p>
  <p class="tile-credit">Imágenes satélite © Esri, Maxar, Earthstar Geographics</p>
</div>

<script>
/* ── SKY RENDERER ── */
const canvas = document.getElementById('sky-canvas');
const ctx    = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', () => { resizeCanvas(); drawSky(); });

const SKY_KEYS = {
   0: { top:'#01030d', mid:'#050b1a', bot:'#07132b', sea:'#040c1e', sun:null },
   3: { top:'#01030d', mid:'#050b1a', bot:'#07132b', sea:'#040c1e', sun:null },
   5: { top:'#0d1b3e', mid:'#1a2a5e', bot:'#3b3060', sea:'#1a2a5e', sun:{x:.32,y:.90,r:.04,c:'#ff8c42',g:'#ff4500'} },
   6: { top:'#0e1f4d', mid:'#c8603a', bot:'#f9a53c', sea:'#1a3a6a', sun:{x:.33,y:.80,r:.05,c:'#ffe066',g:'#ff8c42'} },
   7: { top:'#1a3a7a', mid:'#4a90c8', bot:'#f7c97e', sea:'#2255a0', sun:{x:.40,y:.68,r:.06,c:'#fff5aa',g:'#ffd060'} },
   8: { top:'#1c4a9c', mid:'#3a80d0', bot:'#87ceeb', sea:'#2a60b0', sun:{x:.52,y:.52,r:.07,c:'#fff7aa',g:'#ffe060'} },
  10: { top:'#185db8', mid:'#3589e0', bot:'#8ad4f5', sea:'#2a6ccc', sun:{x:.68,y:.33,r:.08,c:'#fff9cc',g:'#ffe680'} },
  12: { top:'#1060c0', mid:'#3090f0', bot:'#9adfff', sea:'#2a75dd', sun:{x:.80,y:.16,r:.09,c:'#ffffff',g:'#fff5bb'} },
  14: { top:'#1568c8', mid:'#3595f8', bot:'#9ae2ff', sea:'#2a7aee', sun:{x:.84,y:.14,r:.09,c:'#ffffff',g:'#fff8cc'} },
  16: { top:'#1a5aaa', mid:'#3382d8', bot:'#80c8f0', sea:'#2068c0', sun:{x:.80,y:.20,r:.08,c:'#ffee88',g:'#ffd040'} },
  18: { top:'#0e2060', mid:'#c05028', bot:'#f5993a', sea:'#1a3060', sun:{x:.62,y:.72,r:.07,c:'#ffcc44',g:'#ff8820'} },
  19: { top:'#08142e', mid:'#9a3020', bot:'#e8701a', sea:'#0e1e40', sun:{x:.50,y:.83,r:.06,c:'#ff9933',g:'#cc4400'} },
  20: { top:'#060e22', mid:'#3a1a30', bot:'#8a2a18', sea:'#080e28', sun:{x:.42,y:.92,r:.04,c:'#cc4411',g:'#880000'} },
  21: { top:'#030810', mid:'#101530', bot:'#1a1a38', sea:'#050b1e', sun:null },
  23: { top:'#01030d', mid:'#050b1a', bot:'#07132b', sea:'#040c1e', sun:null },
};

function hexToRgb(h) {
  return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
}
function lerpColor(c1, c2, t) {
  const a = hexToRgb(c1), b = hexToRgb(c2);
  return `rgb(${Math.round(a[0]+(b[0]-a[0])*t)},${Math.round(a[1]+(b[1]-a[1])*t)},${Math.round(a[2]+(b[2]-a[2])*t)})`;
}

function getSkyPalette(hour) {
  const keys = Object.keys(SKY_KEYS).map(Number).sort((a,b)=>a-b);
  let lo = keys[keys.length-1], hi = keys[0];
  for (let i=0; i<keys.length; i++) {
    if (keys[i] <= hour) lo = keys[i];
    if (keys[i] > hour) { hi = keys[i]; break; }
  }
  if (lo === hi) return SKY_KEYS[lo];
  const total   = (hi - lo + 24) % 24 || 1;
  const elapsed = (hour - lo + 24) % 24;
  const t = elapsed / total;
  const A = SKY_KEYS[lo], B = SKY_KEYS[hi];
  return {
    top: lerpColor(A.top, B.top, t),
    mid: lerpColor(A.mid, B.mid, t),
    bot: lerpColor(A.bot, B.bot, t),
    sea: lerpColor(A.sea, B.sea, t),
    sun: t < 0.5 ? A.sun : B.sun
  };
}

const STARS = Array.from({length:130}, () => ({
  x: Math.random(),
  y: Math.random() * 0.68,
  r: Math.random() * 1.3 + 0.3,
  a: Math.random()
}));

function starAlpha(h) {
  if (h >= 8  && h < 18) return 0;
  if (h >= 6  && h < 8 ) return 1 - (h-6)/2;
  if (h >= 18 && h < 20) return (h-18)/2;
  return 1;
}

function drawSky() {
  const W = canvas.width, H = canvas.height;
  const now  = new Date();
  const hour = now.getHours() + now.getMinutes()/60;
  const pal  = getSkyPalette(hour);

  const grad = ctx.createLinearGradient(0, 0, 0, H*0.72);
  grad.addColorStop(0,   pal.top);
  grad.addColorStop(0.48, pal.mid);
  grad.addColorStop(1,   pal.bot);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  const sA = starAlpha(hour);
  if (sA > 0.01) {
    STARS.forEach(s => {
      ctx.beginPath();
      ctx.arc(s.x*W, s.y*H*0.75, s.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(255,255,255,${s.a * sA * 0.88})`;
      ctx.fill();
    });
  }

  if (pal.sun) {
    const sx = pal.sun.x * W;
    const sy = pal.sun.y * H * 0.72;
    const sr = pal.sun.r * Math.min(W, H);

    const halo = ctx.createRadialGradient(sx, sy, sr*0.3, sx, sy, sr*4);
    halo.addColorStop(0, pal.sun.g+'77');
    halo.addColorStop(1, 'transparent');
    ctx.fillStyle = halo;
    ctx.fillRect(0, 0, W, H);

    const disc = ctx.createRadialGradient(sx, sy, 0, sx, sy, sr);
    disc.addColorStop(0,   '#ffffff');
    disc.addColorStop(0.28, pal.sun.c);
    disc.addColorStop(1,   pal.sun.g+'00');
    ctx.beginPath();
    ctx.arc(sx, sy, sr, 0, Math.PI*2);
    ctx.fillStyle = disc;
    ctx.fill();

    /* sea reflection */
    const refG = ctx.createRadialGradient(sx, H, 0, sx, H, W*0.45);
    refG.addColorStop(0, pal.sun.g+'44');
    refG.addColorStop(1, 'transparent');
    ctx.fillStyle = refG;
    ctx.fillRect(0, H*0.64, W, H*0.36);
  }

  /* sea strip CSS */
  document.getElementById('sea-strip').style.background =
    `linear-gradient(to bottom, ${pal.sea}cc 0%, ${pal.sea} 100%)`;
}

setInterval(drawSky, 60000);
drawSky();


/* ── SATELLITE TILES (ESRI – free, no key) ── */
function latLonToTile(lat, lon, z) {
  const n = Math.pow(2, z);
  const x = Math.floor((lon + 180) / 360 * n);
  const lr = lat * Math.PI / 180;
  const y = Math.floor((1 - Math.log(Math.tan(lr) + 1/Math.cos(lr)) / Math.PI) / 2 * n);
  return { x, y };
}

function esriSatUrl(lat, lon, zoom) {
  zoom = zoom || 16;
  const { x, y } = latLonToTile(lat, lon, zoom);
  return `https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/${zoom}/${y}/${x}`;
}

const SAT_CACHE = {};

function preloadSat(beaches) {
  beaches.forEach(b => {
    if (SAT_CACHE[b.name] !== undefined) return;
    SAT_CACHE[b.name] = '';
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload  = () => { SAT_CACHE[b.name] = img.src; refreshCards(); };
    img.onerror = () => { SAT_CACHE[b.name] = ''; };
    img.src = esriSatUrl(b.lat, b.lon);
  });
}

function refreshCards() {
  document.querySelectorAll('.card-sat-bg[data-beach]').forEach(el => {
    const name = el.dataset.beach;
    if (SAT_CACHE[name]) el.style.backgroundImage = `url('${SAT_CACHE[name]}')`;
  });
}

function degToDir(d) { return ['N','NE','E','SE','S','SO','O','NO'][Math.round(d/45)%8]; }
function seaState(h) {
  if (h < 0.5) return { label:'Calma',    cls:'state-calm' };
  if (h < 1.5) return { label:'Moderado', cls:'state-moderate' };
  return              { label:'Agitado',  cls:'state-rough' };
}
function waveBarColor(h) {
  if (h < 0.5) return '#4ade80';
  if (h < 1.5) return '#60a5fa';
  if (h < 2.5) return '#fbbf24';
  return '#f87171';
}
function cloudIcon(p) {
  if (p < 20) return '☀️';
  if (p < 50) return '🌤️';
  if (p < 80) return '⛅';
  return '☁️';
}
function getHourIndex(times) {
  const now = Date.now();
  let c = 0, md = Infinity;
  times.forEach((t,i) => { const d = Math.abs(new Date(t) - now); if (d < md) { md = d; c = i; } });
  return c;
}

async function fetchBeachData(beach) {
  const wUrl = `https://api.open-meteo.com/v1/forecast?latitude=${beach.lat}&longitude=${beach.lon}&current=temperature_2m,wind_speed_10m,wind_direction_10m,cloud_cover&wind_speed_unit=kmh&timezone=Europe%2FMadrid&forecast_days=1`;
  const mUrl = `https://marine-api.open-meteo.com/v1/marine?latitude=${beach.lat}&longitude=${beach.lon}&hourly=wave_height,wave_direction&timezone=Europe%2FMadrid&forecast_days=1`;
  const [wRes, mRes] = await Promise.all([fetch(wUrl), fetch(mUrl)]);
  if (!wRes.ok || !mRes.ok) throw new Error('API error');
  const [wData, mData] = await Promise.all([wRes.json(), mRes.json()]);
  const hi = getHourIndex(mData.hourly.time);
  return {
    temp:       Math.round(wData.current.temperature_2m),
    windSpeed:  Math.round(wData.current.wind_speed_10m),
    windDir:    wData.current.wind_direction_10m,
    cloudCover: Math.round(wData.current.cloud_cover),
    waveHeight: mData.hourly.wave_height[hi] ?? 0,
    waveDir:    mData.hourly.wave_direction[hi] ?? 0,
  };
}

function satBg(beach) {
  if (beach.photo && BEACH_PHOTOS[beach.photo]) {
    return `url('${BEACH_PHOTOS[beach.photo]}')`;
  }
  const url = SAT_CACHE[beach.name];
  return url ? `url('${url}')` : 'none';
}

function renderSkeleton(cid, beaches) {
  document.getElementById(cid).innerHTML = beaches.map(b => `
    <div class="beach-card">
      <div class="card-sat-bg" data-beach="${b.name}" style="background-image:${satBg(b)}"></div>
      <div class="card-overlay"></div>
      <div class="card-content">
        <div class="beach-name">${b.name}</div>
        <div class="loading-card"><div class="spinner"></div><span>Cargando...</span></div>
      </div>
    </div>`).join('');
}

function renderCard(b, d) {
  const st   = seaState(d.waveHeight);
  const barW = Math.min(100, (d.waveHeight / 3) * 100).toFixed(0);
  const barC = waveBarColor(d.waveHeight);
  return `
  <div class="beach-card">
    <div class="card-sat-bg" data-beach="${b.name}" style="background-image:${satBg(b)}"></div>
    <div class="card-overlay"></div>
    <span class="sea-state-badge ${st.cls}">${st.label}</span>
    <div class="card-content">
      <div class="beach-name">${b.name}</div>

      <div class="metric-row">
        <div class="metric-icon wave"><i class="ti ti-wave-sine"></i></div>
        <div>
          <div class="metric-label">Altura de ola</div>
          <div class="metric-value">${d.waveHeight.toFixed(1)}<span class="metric-unit">&nbsp;m</span></div>
          <div class="metric-sub">Dir. ${degToDir(d.waveDir)} &middot; ${Math.round(d.waveDir)}&deg;</div>
          <div class="wave-bar-wrap"><div class="wave-bar" style="width:${barW}%;background:${barC}"></div></div>
        </div>
      </div>

      <div class="metric-row">
        <div class="metric-icon wind"><i class="ti ti-wind"></i></div>
        <div>
          <div class="metric-label">Viento</div>
          <div class="metric-value">
            ${d.windSpeed}<span class="metric-unit">&nbsp;km/h</span>
            <svg width="16" height="16" viewBox="-8 -8 16 16" style="transform:rotate(${d.windDir}deg);flex-shrink:0">
              <line x1="0" y1="5" x2="0" y2="-5" stroke="#6ee7b7" stroke-width="2.2" stroke-linecap="round"/>
              <polygon points="0,-7 -2.5,-2 2.5,-2" fill="#6ee7b7"/>
            </svg>
          </div>
          <div class="metric-sub">${degToDir(d.windDir)} &middot; ${Math.round(d.windDir)}&deg;</div>
        </div>
      </div>

      <div class="sky-row">
        <div class="sky-block">
          <div class="sky-icon">🌡️</div>
          <div class="sky-val">${d.temp}°C</div>
          <div class="sky-lbl">Temp</div>
        </div>
        <div class="sky-block">
          <div class="sky-icon">${cloudIcon(d.cloudCover)}</div>
          <div class="sky-val">${d.cloudCover}%</div>
          <div class="sky-lbl">Nubes</div>
        </div>
        <div class="sky-block">
          <div class="sky-icon">${d.cloudCover<30?'😎':d.cloudCover<70?'🌥️':'🌧️'}</div>
          <div class="sky-val">${d.cloudCover<30?'Sol':d.cloudCover<70?'Parcial':'Nublado'}</div>
          <div class="sky-lbl">Cielo</div>
        </div>
      </div>
    </div>
  </div>`;
}

let refreshTimer = null;

async function loadAll() {
  document.getElementById('dot').className = 'dot loading';
  document.getElementById('update-time').textContent = 'Actualizando datos...';

  for (const zone of ZONES) {
    renderSkeleton(`zone-${zone.id}`, zone.beaches);
    const results = await Promise.allSettled(zone.beaches.map(b => fetchBeachData(b)));
    document.getElementById(`zone-${zone.id}`).innerHTML = zone.beaches.map((b, i) => {
      if (results[i].status === 'fulfilled') return renderCard(b, results[i].value);
      return `
        <div class="beach-card">
          <div class="card-sat-bg" data-beach="${b.name}" style="background-image:${satBg(b)}"></div>
          <div class="card-overlay"></div>
          <div class="card-content">
            <div class="beach-name">${b.name}</div>
            <div class="error-msg"><i class="ti ti-alert-circle"></i> Error al cargar</div>
          </div>
        </div>`;
    }).join('');
  }

  const now = new Date();
  const fmt = now.toLocaleString('es-ES', { weekday:'short', day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
  document.getElementById('dot').className = 'dot';
  document.getElementById('update-time').textContent = `Actualizado: ${fmt}`;
  document.getElementById('next-update').textContent  = 'Próxima actualización automática en 30 minutos';

  if (refreshTimer) clearTimeout(refreshTimer);
  refreshTimer = setTimeout(loadAll, 30 * 60 * 1000);
}

function showZone(idx, btn) {
  ZONES.forEach(z => {
    document.getElementById(`zone-${z.id}`).style.display = z.id === idx ? 'grid' : 'none';
  });
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

loadAll();
</script>
</body>
</html>
