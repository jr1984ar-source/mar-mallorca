<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mar Mallorca</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mar Mallorca">
<meta name="theme-color" content="#0a1628">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}
#sky-canvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none}
#sea-strip{position:fixed;bottom:0;left:0;right:0;height:35%;z-index:1;pointer-events:none}
.app{position:relative;z-index:10;max-width:960px;margin:0 auto;padding:20px 16px 48px}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.header-left h1{font-size:22px;font-weight:700;color:#fff;text-shadow:0 1px 8px rgba(0,0,0,.6);display:flex;align-items:center;gap:8px}
.time-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(0,0,0,.30);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:0.5px solid rgba(255,255,255,.2);border-radius:20px;padding:4px 13px;font-size:12px;color:rgba(255,255,255,.88);margin-top:6px}
.time-badge .dot{width:6px;height:6px;border-radius:50%;background:#4ade80;flex-shrink:0}
.time-badge .dot.loading{background:#fbbf24;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.refresh-btn{display:flex;align-items:center;gap:6px;font-size:13px;padding:9px 16px;background:rgba(255,255,255,.15);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:0.5px solid rgba(255,255,255,.3);border-radius:10px;cursor:pointer;color:#fff;font-family:inherit;transition:background .15s}
.refresh-btn:hover{background:rgba(255,255,255,.25)}

/* TABS */
.zone-tabs-wrap{position:relative;margin-bottom:14px;}
.zone-tabs-wrap::after{content:'';position:absolute;right:0;top:0;bottom:0;width:44px;background:linear-gradient(to right,transparent,rgba(0,0,0,.75));border-radius:0 12px 12px 0;pointer-events:none;transition:opacity .25s;z-index:5;}
.zone-tabs-wrap::before{content:'';position:absolute;left:0;top:0;bottom:0;width:24px;background:linear-gradient(to left,transparent,rgba(0,0,0,.55));border-radius:12px 0 0 12px;pointer-events:none;z-index:5;opacity:0;transition:opacity .25s;}
.zone-tabs-wrap.at-end::after{opacity:0;}
.zone-tabs-wrap.scrolled::before{opacity:1;}
.tab-dots{display:flex;justify-content:center;gap:5px;margin-bottom:14px;margin-top:6px;}
.tab-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.25);transition:background .2s,transform .2s;}
.tab-dot.active{background:rgba(255,255,255,.9);transform:scale(1.3);}
.zone-tabs{display:flex;background:rgba(0,0,0,.28);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:0.5px solid rgba(255,255,255,.15);border-radius:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.zone-tabs::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;padding:9px 9px;font-size:11px;font-weight:600;background:transparent;border:none;border-right:0.5px solid rgba(255,255,255,.12);color:rgba(255,255,255,.6);cursor:pointer;font-family:inherit;transition:background .15s,color .15s;white-space:nowrap}
.tab-btn:last-child{border-right:none}
.tab-btn.active{background:rgba(255,255,255,.18);color:#fff}
.tab-btn:hover:not(.active){background:rgba(255,255,255,.08);color:rgba(255,255,255,.85)}

/* GRID */
.beach-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:16px}

/* CARD */
.beach-card{border-radius:16px;border:0.5px solid rgba(255,255,255,.22);overflow:hidden;position:relative;min-height:220px}
.card-bg{position:absolute;inset:0;background-size:cover;background-position:center;background-color:#0d1e2e;z-index:0}
.card-overlay{position:absolute;inset:0;background:rgba(4,16,32,.60);z-index:1}
.card-content{position:relative;z-index:2;padding:15px;color:#fff}
.beach-name{font-size:14px;font-weight:700;color:#fff;margin-bottom:13px;padding-right:72px;text-shadow:0 1px 4px rgba(0,0,0,.7)}
.sea-state-badge{position:absolute;top:13px;right:13px;font-size:10px;padding:3px 9px;border-radius:20px;font-weight:700;letter-spacing:.04em;z-index:3}
.state-calm{background:rgba(74,222,128,.22);color:#86efac;border:0.5px solid rgba(74,222,128,.4)}
.state-moderate{background:rgba(251,191,36,.22);color:#fde68a;border:0.5px solid rgba(251,191,36,.4)}
.state-rough{background:rgba(248,113,113,.22);color:#fca5a5;border:0.5px solid rgba(248,113,113,.4)}
.metric-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.metric-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px}
.metric-icon.wave{background:rgba(56,130,221,.28);color:#93c5fd;border:0.5px solid rgba(147,197,253,.3)}
.metric-icon.wind{background:rgba(52,211,153,.22);color:#6ee7b7;border:0.5px solid rgba(110,231,183,.3)}
.metric-label{font-size:10px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.metric-value{font-size:18px;font-weight:700;color:#fff;line-height:1.15;display:flex;align-items:center;gap:5px;text-shadow:0 1px 3px rgba(0,0,0,.6)}
.metric-unit{font-size:12px;font-weight:400;color:rgba(255,255,255,.55)}
.metric-sub{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px}
.wave-bar-wrap{margin-top:5px;height:3px;background:rgba(255,255,255,.12);border-radius:2px;overflow:hidden}
.wave-bar{height:100%;border-radius:2px}
.sky-row{display:flex;margin-top:12px;padding-top:11px;border-top:0.5px solid rgba(255,255,255,.14)}
.sky-block{flex:1;text-align:center;padding:3px 0}
.sky-block+.sky-block{border-left:0.5px solid rgba(255,255,255,.12)}
.sky-icon{font-size:19px;margin-bottom:3px}
.sky-val{font-size:15px;font-weight:700;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.5)}
.sky-lbl{font-size:10px;color:rgba(255,255,255,.45);margin-top:1px}
.cam-btn{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;margin-top:11px;padding:9px 0;background:rgba(220,38,38,.18);border:0.5px solid rgba(248,113,113,.4);border-radius:10px;color:#fca5a5;font-size:12px;font-weight:600;letter-spacing:.04em;cursor:pointer;font-family:inherit;text-decoration:none;transition:background .15s}
.cam-btn:hover{background:rgba(220,38,38,.30)}
.cam-dot{width:6px;height:6px;border-radius:50%;background:#f87171;animation:pulse 1.2s infinite;flex-shrink:0}
.loading-card{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:160px;gap:10px;color:rgba(255,255,255,.55);font-size:13px}
.spinner{width:22px;height:22px;border:2px solid rgba(255,255,255,.18);border-top-color:#93c5fd;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-msg{display:flex;align-items:center;justify-content:center;min-height:80px;gap:6px;font-size:13px;color:#fca5a5}
.next-update{font-size:12px;color:rgba(255,255,255,.4);text-align:center;margin-top:24px;text-shadow:0 1px 3px rgba(0,0,0,.5)}

/* MAP */
#map-container{border-radius:16px;overflow:hidden;border:0.5px solid rgba(255,255,255,.2);position:relative}
#mallorca-map{width:100%;height:auto;aspect-ratio:900/606;min-height:280px;max-height:75vh;background:#0d2a3e;position:relative;overflow:hidden;cursor:default;border-radius:16px;}
#map-legend{position:absolute;top:12px;right:12px;z-index:50;background:rgba(10,22,40,.85);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:0.5px solid rgba(255,255,255,.18);border-radius:10px;padding:10px 12px;display:flex;flex-direction:column;gap:6px}
.leg-item{display:flex;align-items:center;gap:7px;font-size:11px;color:rgba(255,255,255,.8);white-space:nowrap}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
#map-status{text-align:center;font-size:12px;color:rgba(255,255,255,.45);margin-top:8px}
.map-popup{position:absolute;background:rgba(10,22,40,.95);border:0.5px solid rgba(255,255,255,.2);border-radius:12px;padding:12px 14px;color:#fff;font-size:12px;min-width:180px;z-index:100;transform:translate(-50%,-110%);box-shadow:0 4px 20px rgba(0,0,0,.5)}
.map-popup::after{content:'';position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-top:6px solid rgba(10,22,40,.95)}
.pop-close{float:right;cursor:pointer;opacity:.6;font-size:14px;line-height:1;margin-left:8px}
.pop-name{font-size:14px;font-weight:700;margin-bottom:8px}
.pop-row{margin-bottom:4px}
.pop-cam{display:inline-flex;align-items:center;gap:4px;margin-top:8px;padding:5px 10px;background:rgba(220,38,38,.25);border:0.5px solid rgba(248,113,113,.4);border-radius:7px;color:#fca5a5;font-size:11px;font-weight:600;text-decoration:none}

@media(max-width:520px){.tab-btn{font-size:11px;padding:9px 8px}.beach-grid{grid-template-columns:1fr}}
</style>
</head>

function h2r(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function lc(c1,c2,t){const a=h2r(c1),b=h2r(c2);return'rgb('+Math.round(a[0]+(b[0]-a[0])*t)+','+Math.round(a[1]+(b[1]-a[1])*t)+','+Math.round(a[2]+(b[2]-a[2])*t)+')';}
function getPal(hour){const keys=Object.keys(SKY).map(Number).sort((a,b)=>a-b);let lo=keys[keys.length-1],hi=keys[0];for(let i=0;i<keys.length;i++){if(keys[i]<=hour)lo=keys[i];if(keys[i]>hour){hi=keys[i];break;}}if(lo===hi)return SKY[lo];const t=((hour-lo+24)%24)/((hi-lo+24)%24||1);const A=SKY[lo],B=SKY[hi];return{t:lc(A.t,B.t,t),m:lc(A.m,B.m,t),b:lc(A.b,B.b,t),s:lc(A.s,B.s,t),sun:t<.5?A.sun:B.sun};}
const STARS=Array.from({length:130},()=>({x:Math.random(),y:Math.random()*.68,r:Math.random()*1.3+.3,a:Math.random()}));
function starA(h){if(h>=8&&h<18)return 0;if(h>=6&&h<8)return 1-(h-6)/2;if(h>=18&&h<20)return(h-18)/2;return 1;}
function drawSky(){const W=canvas.width,H=canvas.height,now=new Date(),hour=now.getHours()+now.getMinutes()/60,p=getPal(hour);const g=ctx.createLinearGradient(0,0,0,H*.72);g.addColorStop(0,p.t);g.addColorStop(.48,p.m);g.addColorStop(1,p.b);ctx.fillStyle=g;ctx.fillRect(0,0,W,H);const sA=starA(hour);if(sA>.01)STARS.forEach(s=>{ctx.beginPath();ctx.arc(s.x*W,s.y*H*.75,s.r,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,'+(s.a*sA*.88)+')';ctx.fill();});if(p.sun){const sx=p.sun.x*W,sy=p.sun.y*H*.72,sr=p.sun.r*Math.min(W,H);const halo=ctx.createRadialGradient(sx,sy,sr*.3,sx,sy,sr*4);halo.addColorStop(0,p.sun.g+'77');halo.addColorStop(1,'transparent');ctx.fillStyle=halo;ctx.fillRect(0,0,W,H);const disc=ctx.createRadialGradient(sx,sy,0,sx,sy,sr);disc.addColorStop(0,'#fff');disc.addColorStop(.28,p.sun.c);disc.addColorStop(1,p.sun.g+'00');ctx.beginPath();ctx.arc(sx,sy,sr,0,Math.PI*2);ctx.fillStyle=disc;ctx.fill();const rf=ctx.createRadialGradient(sx,H,0,sx,H,W*.45);rf.addColorStop(0,p.sun.g+'44');rf.addColorStop(1,'transparent');ctx.fillStyle=rf;ctx.fillRect(0,H*.64,W,H*.36);}
document.getElementById('sea-strip').style.background='linear-gradient(to bottom,'+p.s+'cc 0%,'+p.s+' 100%)';}
setInterval(drawSky,60000);drawSky();

// ── HELPERS ──
function degToDir(d){return['N','NE','E','SE','S','SO','O','NO'][Math.round(d/45)%8];}
function seaState(h){if(h<.5)return{label:'Calma',cls:'state-calm'};if(h<1.5)return{label:'Moderado',cls:'state-moderate'};return{label:'Agitado',cls:'state-rough'};}
function waveColor(h){if(h<.5)return'#4ade80';if(h<1.5)return'#60a5fa';if(h<2.5)return'#fbbf24';return'#f87171';}
function cloudIcon(p){if(p<20)return'☀️';if(p<50)return'🌤️';if(p<80)return'⛅';return'☁️';}
function getHourIndex(times){const now=Date.now();let c=0,md=Infinity;times.forEach((t,i)=>{const d=Math.abs(new Date(t)-now);if(d<md){md=d;c=i;}});return c;}

// ── FETCH ──
async function fetchBeach(b){
  const wUrl='https://api.open-meteo.com/v1/forecast?latitude='+b.lat+'&longitude='+b.lon+'&current=temperature_2m,wind_speed_10m,wind_direction_10m,cloud_cover&wind_speed_unit=kmh&timezone=Europe%2FMadrid&forecast_days=1';
  const mUrl='https://marine-api.open-meteo.com/v1/marine?latitude='+b.lat+'&longitude='+b.lon+'&hourly=wave_height,wave_direction&timezone=Europe%2FMadrid&forecast_days=1';
  const [wR,mR]=await Promise.all([fetch(wUrl),fetch(mUrl)]);
  if(!wR.ok||!mR.ok)throw new Error('err');
  const [wD,mD]=await Promise.all([wR.json(),mR.json()]);
  const hi=getHourIndex(mD.hourly.time);
  return{temp:Math.round(wD.current.temperature_2m),windSpeed:Math.round(wD.current.wind_speed_10m),windDir:wD.current.wind_direction_10m,cloudCover:Math.round(wD.current.cloud_cover),waveHeight:mD.hourly.wave_height[hi]||0,waveDir:mD.hourly.wave_direction[hi]||0};
}

// ── RENDER CARD ──
function renderCard(b,d){
  const st=seaState(d.waveHeight);
  const barW=Math.min(100,(d.waveHeight/3)*100).toFixed(0);
  const barC=waveColor(d.waveHeight);
  const bg=PHOTOS[b.img]?'url('+PHOTOS[b.img]+')':'none';
  const cam=b.cam?'<a class="cam-btn" href="'+b.cam+'" target="_blank" rel="noopener"><span class="cam-dot"></span><i class="ti ti-video"></i>VER WEBCAM EN DIRECTO</a>':'';
  return '<div class="beach-card">'+
    '<div class="card-bg" style="background-image:'+bg+'"></div>'+
    '<div class="card-overlay"></div>'+
    '<span class="sea-state-badge '+st.cls+'">'+st.label+'</span>'+
    '<div class="card-content">'+
      '<div class="beach-name">'+b.name+'</div>'+
      '<div class="metric-row">'+
        '<div class="metric-icon wave"><i class="ti ti-wave-sine"></i></div>'+
        '<div>'+
          '<div class="metric-label">Altura de ola</div>'+
          '<div class="metric-value">'+d.waveHeight.toFixed(1)+'<span class="metric-unit">&nbsp;m</span></div>'+
          '<div class="metric-sub">Dir. '+degToDir(d.waveDir)+' &middot; '+Math.round(d.waveDir)+'&deg;</div>'+
          '<div class="wave-bar-wrap"><div class="wave-bar" style="width:'+barW+'%;background:'+barC+'"></div></div>'+
        '</div>'+
      '</div>'+
      '<div class="metric-row">'+
        '<div class="metric-icon wind"><i class="ti ti-wind"></i></div>'+
        '<div>'+
          '<div class="metric-label">Viento</div>'+
          '<div class="metric-value">'+d.windSpeed+'<span class="metric-unit">&nbsp;km/h</span>'+
            '<svg width="16" height="16" viewBox="-8 -8 16 16" style="transform:rotate('+d.windDir+'deg);flex-shrink:0"><line x1="0" y1="5" x2="0" y2="-5" stroke="#6ee7b7" stroke-width="2.2" stroke-linecap="round"/><polygon points="0,-7 -2.5,-2 2.5,-2" fill="#6ee7b7"/></svg>'+
          '</div>'+
          '<div class="metric-sub">'+degToDir(d.windDir)+' &middot; '+Math.round(d.windDir)+'&deg;</div>'+
        '</div>'+
      '</div>'+
      '<div class="sky-row">'+
        '<div class="sky-block"><div class="sky-icon">🌡️</div><div class="sky-val">'+d.temp+'°C</div><div class="sky-lbl">Temp</div></div>'+
        '<div class="sky-block"><div class="sky-icon">'+cloudIcon(d.cloudCover)+'</div><div class="sky-val">'+d.cloudCover+'%</div><div class="sky-lbl">Nubes</div></div>'+
        '<div class="sky-block"><div class="sky-icon">'+(d.cloudCover<30?'😎':d.cloudCover<70?'🌥️':'🌧️')+'</div><div class="sky-val">'+(d.cloudCover<30?'Sol':d.cloudCover<70?'Parcial':'Nublado')+'</div><div class="sky-lbl">Cielo</div></div>'+
      '</div>'+
      cam+
    '</div>'+
  '</div>';
}

// ── LOAD ──
function renderSkeleton(cid,beaches){
  document.getElementById(cid).innerHTML=beaches.map(b=>'<div class="beach-card"><div class="card-bg" style="background-image:'+(PHOTOS[b.img]?'url('+PHOTOS[b.img]+')':'none')+'"></div><div class="card-overlay"></div><div class="card-content"><div class="beach-name">'+b.name+'</div><div class="loading-card"><div class="spinner"></div><span>Cargando...</span></div></div></div>').join('');
}

var refreshTimer=null;
async function loadAll(){
  document.getElementById('dot').className='dot loading';
  document.getElementById('update-time').textContent='Actualizando...';
  for(const zone of ZONES){
    renderSkeleton('zone-'+zone.id,zone.beaches);
    const results=await Promise.allSettled(zone.beaches.map(b=>fetchBeach(b)));
    document.getElementById('zone-'+zone.id).innerHTML=zone.beaches.map((b,i)=>{
      if(results[i].status==='fulfilled')return renderCard(b,results[i].value);
      return '<div class="beach-card"><div class="card-bg" style="background-image:'+(PHOTOS[b.img]?'url('+PHOTOS[b.img]+')':'none')+'"></div><div class="card-overlay"></div><div class="card-content"><div class="beach-name">'+b.name+'</div><div class="error-msg"><i class="ti ti-alert-circle"></i> Error al cargar</div></div></div>';
    }).join('');
  }
  const now=new Date();
  const fmt=now.toLocaleString('es-ES',{weekday:'short',day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
  document.getElementById('dot').className='dot';
  document.getElementById('update-time').textContent='Actualizado: '+fmt;
  document.getElementById('next-update').textContent='Próxima actualización automática en 30 minutos';
  if(refreshTimer)clearTimeout(refreshTimer);
  refreshTimer=setTimeout(loadAll,30*60*1000);
}

// ── ZONE SWITCHING ──
function showZone(idx,btn){
  for(var i=0;i<7;i++){
    var el=document.getElementById('zone-'+i);
    if(el) el.style.display='none';
  }
  var target=document.getElementById('zone-'+idx);
  if(target) target.style.display=(idx===6?'block':'grid');
  if(idx===6) setTimeout(initMap,80);
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  // Update dots
  document.querySelectorAll('.tab-dot').forEach(function(d,i){d.classList.toggle('active',i===idx);});
  // Scroll active tab into view
  btn.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}

function project(lat,lon,W,H){
  var n=Math.pow(2,viewState.zoom),TILE=256;
  var cx=(viewState.lon+180)/360*n;
  var clr=viewState.lat*Math.PI/180;
  var cy=(1-Math.log(Math.tan(clr)+1/Math.cos(clr))/Math.PI)/2*n;
  var tx=(lon+180)/360*n;
  var tlr=lat*Math.PI/180;
  var ty=(1-Math.log(Math.tan(tlr)+1/Math.cos(tlr))/Math.PI)/2*n;
  return{px:W/2+(tx-cx)*TILE,py:H/2+(ty-cy)*TILE};
}

var mapDataStatic = {};

function buildMap() {
  var el = document.getElementById('mallorca-map');
  if (!el) return;

  // Clear previous markers/popups
  Array.from(el.querySelectorAll('.smap-marker,.map-popup')).forEach(function(c){c.remove();});

  MAP_MARKERS.forEach(function(b) {
    var d = mapDataStatic[b.name];
    var color = d ? waveColor(d.waveHeight) : '#60a5fa';
    var label = d ? d.waveHeight.toFixed(1)+'m' : '…';

    var m = document.createElement('div');
    m.className = 'smap-marker';
    m.style.cssText = 'position:absolute;left:'+b.x+'%;top:'+b.y+'%;transform:translate(-50%,-50%);z-index:10;cursor:pointer;text-align:center;';
    m.innerHTML =
      '<div style="width:34px;height:34px;border-radius:50%;background:'+color+';border:2.5px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;margin:0 auto;">'+label+'</div>'+
      '<div style="font-size:8px;color:#fff;text-shadow:0 1px 3px #000;margin-top:2px;white-space:nowrap;">'+b.name+'</div>';

    (function(beach, data){
      m.addEventListener('click', function(e){
        e.stopPropagation();
        showStaticPopup(beach, data, el);
      });
    })(b, d);

    el.appendChild(m);
  });

  // Close popup on map click
  el.onclick = function(){ var p=el.querySelector('.map-popup'); if(p) p.remove(); };
}

function showStaticPopup(b, d, el) {
  var old = el.querySelector('.map-popup'); if(old) old.remove();
  if (!d) return;
  var p = document.createElement('div');
  p.className = 'map-popup';
  // Position near marker but keep within bounds
  var left = Math.min(Math.max(b.x, 20), 75);
  var top  = b.y > 60 ? (b.y - 28) : (b.y + 8);
  p.style.cssText = 'position:absolute;left:'+left+'%;top:'+top+'%;transform:translateX(-50%);';
  var cam = b.cam ? '<a class="pop-cam" href="'+b.cam+'" target="_blank">▶ Webcam</a>' : '';
  p.innerHTML =
    '<span class="pop-close" onclick="this.parentNode.remove();event.stopPropagation()">✕</span>'+
    '<div class="pop-name">'+b.name+'</div>'+
    '<div class="pop-row">🌊 <b>'+d.waveHeight.toFixed(1)+'m</b> · '+(d.waveHeight<.5?'Calma':d.waveHeight<1.5?'Suave':d.waveHeight<2.5?'Moderado':'Agitado')+'</div>'+
    '<div class="pop-row">💨 <b>'+d.windSpeed+' km/h</b> · '+degToDir(d.windDir)+'</div>'+
    '<div class="pop-row">🌡️ <b>'+d.temp+'°C</b> · ☁️ '+d.cloudCover+'%</div>'+
    cam;
  el.appendChild(p);
}

function waveColor(h){if(h<.5)return'#4ade80';if(h<1.5)return'#60a5fa';if(h<2.5)return'#fbbf24';return'#f87171';}

async function initMap() {
  buildMap();
  if (mapLoaded) return;
  mapLoaded = true;
  document.getElementById('map-status').textContent = 'Cargando datos...';
  var allB = ZONES.reduce(function(a,z){return a.concat(z.beaches);}, []);
  var results = await Promise.allSettled(allB.map(b => fetchBeach(b)));
  results.forEach(function(r,i){
    if (r.status==='fulfilled') mapDataStatic[allB[i].name] = r.value;
  });
  buildMap();
  document.getElementById('map-status').textContent = 'Toca un punto para ver los datos';
}

// ── SWIPE ──
(function(){
  var sx=0,sy=0;
  var el=document.querySelector('.app');
  el.addEventListener('touchstart',function(e){sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});
  el.addEventListener('touchend',function(e){
    var dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;
    if(Math.abs(dx)<50||Math.abs(dy)>Math.abs(dx))return;
    var tabs=document.querySelectorAll('.tab-btn');
    var cur=-1;tabs.forEach(function(t,i){if(t.classList.contains('active'))cur=i;});
    if(dx<0&&cur<tabs.length-1)tabs[cur+1].click();
    else if(dx>0&&cur>0)tabs[cur-1].click();
  },{passive:true});
})();
